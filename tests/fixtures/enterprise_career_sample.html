<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>企业官方招聘页样例</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "JobPosting",
    "title": "自动化设备调试工程师",
    "url": "/careers/automation-debug-engineer",
    "hiringOrganization": {"@type": "Organization", "name": "样例制造企业"},
    "description": "岗位职责：负责 PLC 输入公共端接线、传感器 NPN/PNP 信号调试与在线监控。任职要求：熟悉电气安全检查、I/O 地址映射和设备排故。技能要求：PLC、传感器、公共端、在线监控。"
  }
  </script>
</head>
<body>
  <main class="career-page">
    <section data-ph-at-id="job-results">
      <article class="job-card" data-ph-at-id="job-card">
        <a href="/jobs/plc-maintenance-technician">
          <h3 data-ph-at-id="job-title">PLC 运维技术员</h3>
        </a>
        <p>岗位职责：负责自动化产线 PLC 输入公共端判断、S/S 端接线核查和设备在线监控。</p>
        <p>任职要求：掌握 NPN/PNP 传感器接线、电气安全检查和故障排查。</p>
        <p>技能要求：PLC 调试；传感器信号；电气安全；I/O 地址映射。</p>
      </article>
      <article class="position-item">
        <a href="/jobs/electrical-maintenance-engineer">
          <h3>电气维护工程师</h3>
        </a>
        <p>工作职责：负责设备巡检、DC24V 供电确认、急停回路检查与现场故障复盘。</p>
        <p>职位要求：能阅读电气图纸，熟悉传感器信号采集和 PLC 在线监控。</p>
      </article>
    </section>
  </main>
</body>
</html>
