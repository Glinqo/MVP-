<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><title>自动化设备调试岗位样例</title></head>
  <body>
    <main>
      <h1>自动化生产线装调与运维技术员</h1>
      <p>岗位新人需要熟悉 PLC 输入点、I/O 地址映射、程序变量查找和在线监控。</p>
      <p>实训中常见任务包括识别 NPN/PNP 三线制传感器、根据棕线蓝线黑线判断接线，并核对 PLC 输入公共端 COM 或 S/S。</p>
      <p>遇到传感器动作灯亮但 PLC 输入灯不亮时，应按 24V 供电、传感器接线、公共端、输入模块和地址映射顺序排查。</p>
      <p>设备调试前需要断电确认、急停确认和气源状态确认。</p>
    </main>
  </body>
</html>
